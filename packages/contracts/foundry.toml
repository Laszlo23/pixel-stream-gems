[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules", "../../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

# Contract verification on Base Sepolia (chain 84532). Key from https://basescan.org/myapikey
[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = "84532" }
